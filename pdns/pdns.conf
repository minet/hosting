local-address=0.0.0.0,::
include-dir=/etc/powerdns/pdns.d
default-dnssec-policy=default

# Allow AXFR from any source (ingress mode rewrites source IPs)
allow-axfr-ips=0.0.0.0/0,::/0
# In dev/preprod, disable notify to avoid hitting real nameservers.
# For production, override with: also-notify=192.168.102.55,192.168.102.54
disable-axfr=no
