services:
  postgres:
    image: postgres:16
    container_name: minet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hosting
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hosting"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: minet_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: minet_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/hosting
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  # frontend:
  #   build: ./frontend
  #   container_name: minet_frontend
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #   ports:
  #     - "80:80"

volumes:
  postgres_data:
  redis_data:
