services:
  postgres:
    image: postgres:16
    container_name: minet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hosting
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hosting"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: minet_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/hosting
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      DB_POOL_MIN_SIZE: 5
      DB_POOL_MAX_SIZE: 20
    volumes:
      - ./backend/CHARTE.md:/charte/CHARTE.md:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    container_name: minet_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    ports:
      - "5173:5173"

  pdns:
    image: powerdns/pdns-auth-49
    container_name: minet_pdns
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PDNS_AUTH_API: "yes"
      PDNS_AUTH_API_KEY: "${PDNS_API_KEY:-changeme}"
      PDNS_AUTH_WEBSERVER: "yes"
      PDNS_AUTH_WEBSERVER_ADDRESS: "0.0.0.0"
      PDNS_AUTH_WEBSERVER_PORT: "8081"
      PDNS_AUTH_WEBSERVER_ALLOW_FROM: "0.0.0.0/0"
      PDNS_AUTH_LAUNCH: "gpgsql"
      PDNS_AUTH_GPGSQL_HOST: "postgres"
      PDNS_AUTH_GPGSQL_PORT: "5432"
      PDNS_AUTH_GPGSQL_DBNAME: "hosting"
      PDNS_AUTH_GPGSQL_USER: "app"
      PDNS_AUTH_GPGSQL_PASSWORD: "app"
      PDNS_AUTH_GPGSQL_DNSSEC: "no"
      PDNS_AUTH_GPGSQL_TABLE_PREFIX: "pdns_"
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8081:8081"

volumes:
  postgres_data:
