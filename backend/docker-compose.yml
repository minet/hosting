services:
  backend:
    image: python:3.12-slim
    container_name: minet_backend
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/hosting
      SESSION_SECRET: dev-secret-change-me
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             sh docker-entrypoint.sh --reload"
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16
    container_name: minet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hosting
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hosting"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  frontend_test:
    image: nginx:alpine
    container_name: minet_frontend_test
    volumes:
      - ../frontend_test:/usr/share/nginx/html:ro
    ports:
      - "8081:80"

volumes:
  postgres_data:
