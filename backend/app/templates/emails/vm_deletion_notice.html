<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f4f6;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;">

        <!-- Header -->
        <tr>
          <td style="background:#dc2626;padding:28px 40px;text-align:center;color:#fff;font-size:20px;font-weight:bold;">
            Suppression de votre VM dans 24h
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:40px;">
            <p style="font-size:15px;color:#374151;">Bonjour <strong>{{ prenom }} {{ nom }}</strong>,</p>
            <p style="font-size:15px;color:#374151;">
              Votre cotisation MiNET a expiré il y a <strong>{{ days_expired }} jour{{ 's' if days_expired > 1 else '' }}</strong>.
            </p>
            <p style="font-size:15px;color:#374151;">
              Votre machine virtuelle <strong>{{ vm_name }}</strong> (#{{ vm_id }}) sera supprimée automatiquement dans <strong>24h</strong>.
            </p>
            <p style="font-size:13px;color:#6b7280;">— L'équipe MiNET</p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
