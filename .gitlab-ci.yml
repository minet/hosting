stages:
  - docker
  - deploy

# ── Helper ────────────────────────────────────────────────────────────────────

.kaniko_auth: &kaniko_auth
  before_script:
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_JOB_TOKEN" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

# ── Docker stage ──────────────────────────────────────────────────────────────
# Images are tagged with the branch slug (main / pre-prod).
# Stack files in swarm-prod reference these tags directly.

docker_backend:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/backend"
      --dockerfile "$CI_PROJECT_DIR/backend/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG"
      --destination "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/backend/cache"
      --snapshot-mode=redo
      --use-new-run
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'

# Frontend is built with baked-in VITE_* values that differ per environment.

docker_frontend_prod:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/frontend"
      --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/frontend:main"
      --destination "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
      --build-arg "VITE_API_URL=https://hosting.minet.net"
      --build-arg "VITE_DNS_ZONE=h.minet.net"
      --build-arg "VITE_RESTRICTED_ROLES=/adh6_admin,/cluster-dev"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/frontend/cache"
      --snapshot-mode=redo
      --use-new-run
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*

docker_frontend_preprod:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/frontend"
      --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/frontend:pre-prod"
      --destination "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
      --build-arg "VITE_API_URL=https://hosting-dev.minet.net"
      --build-arg "VITE_DNS_ZONE=hdev.minet.net"
      --build-arg "VITE_RESTRICTED_ROLES=/adh6_admin,/cluster-dev"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/frontend/cache"
      --snapshot-mode=redo
      --use-new-run
  rules:
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'
      changes:
        - frontend/**/*

docker_pdns:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/pdns"
      --dockerfile "$CI_PROJECT_DIR/pdns/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/pdns:$CI_COMMIT_REF_SLUG"
      --destination "$CI_REGISTRY_IMAGE/pdns:$CI_COMMIT_SHORT_SHA"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/pdns/cache"
      --snapshot-mode=redo
      --use-new-run
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - pdns/**/*
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'

# ── Deploy stage ──────────────────────────────────────────────────────────────

deploy_prod:
  stage: deploy
  trigger:
    project: minet/configurations/push/swarm-prod
    branch: main
    strategy: depend
    inputs:
      folder_name: hosting.minet.net
      image_registry: $CI_REGISTRY_IMAGE
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy_preprod:
  stage: deploy
  trigger:
    project: minet/configurations/push/swarm-prod
    branch: main
    strategy: depend
    inputs:
      folder_name: hosting-dev.minet.net
      image_registry: $CI_REGISTRY_IMAGE
  rules:
    - if: '$CI_COMMIT_BRANCH == "pre-prod"'
