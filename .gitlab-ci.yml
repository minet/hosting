stages:
  - docker
  - deploy

variables:
  IMAGE_REGISTRY_BASE: $CI_REGISTRY_IMAGE

# ── Docker stage ──────────────────────────────────────────────────────────────

.kaniko_auth: &kaniko_auth
  before_script:
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_JOB_TOKEN" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json

docker_backend:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/backend"
      --dockerfile "$CI_PROJECT_DIR/backend/Dockerfile"
      --destination "$IMAGE_REGISTRY_BASE/backend:latest"
      --destination "$IMAGE_REGISTRY_BASE/backend:$CI_COMMIT_SHORT_SHA"
      --cache=true
      --cache-repo "$IMAGE_REGISTRY_BASE/backend/cache"

docker_frontend:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  <<: *kaniko_auth
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/frontend"
      --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile"
      --destination "$IMAGE_REGISTRY_BASE/frontend:latest"
      --destination "$IMAGE_REGISTRY_BASE/frontend:$CI_COMMIT_SHORT_SHA"
      --build-arg "VITE_API_URL=${VITE_API_URL:https://hosting-dev.minet.net}"
      --build-arg "VITE_DNS_ZONE=${VITE_DNS_ZONE:hdev.minet.net}"
      --build-arg "VITE_RESTRICTED_ROLES=${VITE_RESTRICTED_ROLES:/adh6-admin,/cluster-dev}"
      --cache=true
      --cache-repo "$IMAGE_REGISTRY_BASE/frontend/cache"

# ── Deploy stage ──────────────────────────────────────────────────────────────

deploy:
  stage: deploy
  trigger:
    project: minet/configurations/push/swarm-prod
    branch: main
    strategy: depend
    inputs:
      folder_name: hosting-dev.minet.net
      image_registry: $CI_REGISTRY_IMAGE
  needs:
    - docker_backend
    - docker_frontend
